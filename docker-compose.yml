services:
  postgres:
    image: postgres:16-alpine
    container_name: prism_club_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
      POSTGRES_DB: prism_club
    ports:
      # Host 5433 → container 5432. Avoids conflict with a Windows-installed
      # PostgreSQL service that may also be listening on 5432.
      - "5433:5432"
    volumes:
      - prism_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism -d prism_club"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: prism_club_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - optional

volumes:
  prism_postgres_data:
