name: mobile
description: "PRISM Club mobile app"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State + DI
  flutter_riverpod: ^2.6.1

  # HTTP
  dio: ^5.7.0

  # Routing
  go_router: ^14.6.2

  # Persistence
  shared_preferences: ^2.3.3

  # Codegen helpers (annotations only at runtime)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
